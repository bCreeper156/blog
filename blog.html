<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博客文章 - 156博客</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/blog.css">
    <script src="js/common.js"></script>
    <script src="js/blog_list.js"></script>
</head>
<body>
    <header>
        <button class="menu">&#9776;</button>
        <h1><a href="/index.html">156博客</a></h1>
        <nav>
            <ul>
                <li><a href="/index.html">首页</a></li>
                <li><a href="/jump_warning.html?url=http://156pan.owo.vin">网盘</a></li>
                <li><a href="/blog.html">博客</a></li>
                <li><a href="/link.html">链接</a></li>                
            </ul>
        </nav>  
    </header>
    
    <main class="container">
        <div class="controls">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="search" placeholder="搜索文章...">
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">全部</button>
	            <button class="filter-btn" data-filter="游戏">游戏</button>
                <button class="filter-btn" data-filter="软件测评">软件测评</button>
                <button class="filter-btn" data-filter="公告">公告</button>
                <button class="filter-btn" data-filter="工具">工具</button>
            </div>
        </div>
        
        <!-- 添加滚动容器 -->
        <div class="articles-container-wrapper">
            <ul class="articles-list" id="articles-container">
                <!-- 文章列表将通过JavaScript动态生成 -->
            </ul>
        </div>
        
        <div class="pagination">
            <!-- 分页按钮将通过JavaScript动态生成 -->
        </div>
    </main>
    
    <footer>
        <p><a href ="/jump_warning.html?url=https://github.com/bCreeper156/blog/blob/main/LICENSE">Copyright © 2026 Creeper156</a></p>
    </footer>
</body>
</html>
