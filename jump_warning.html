<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全警告 - 156博客</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/common.js"></script>
    <!-- 提前检查并跳转：如果是允许的站内域名则直接跳转，避免显示警告 -->
    <script>
        (function() {
            // 修复：动态获取当前站点的 origin（支持自定义域名），不再硬编码
            const ALLOWED_PREFIX = window.location.origin; // 例如 https://156blog.netlify.app 或你的自定义域名
            // 获取URL参数中的目标链接 (支持常用参数名)
            function getTargetUrl() {
                const params = new URLSearchParams(window.location.search);
                let url = params.get('url') || params.get('target') || params.get('link') || params.get('to');
                if (!url) return null;
                url = url.trim();
                try {
                    // 以当前页面为基准解析相对链接
                    const base = window.location.origin;
                    const parsed = new URL(url, base);
                    // 只允许 http/https 协议
                    if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
                        return null;
                    }
                    return parsed.href; // 返回规范化后的完整URL
                } catch (e) {
                    return null;
                }
            }

            const targetHref = getTargetUrl();
            // 如果存在目标链接且以允许的域名开头（当前站点的origin），直接跳转（不显示警告）
            if (targetHref && targetHref.startsWith(ALLOWED_PREFIX)) {
                // 使用 replace 以避免在历史记录中留下当前警告页面
                window.location.replace(targetHref);
            }
            // 否则，继续加载页面，显示警告内容
        })();
    </script>
    <style>
        .anniu a {
            color: #11cb5f;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .anniu a:hover {
            color: #11cb5f;
            opacity: 0.8;
        }
        .anniu .cancel-link {
            color: #888;
            margin-right: 20px;
        }
        .anniu .cancel-link:hover {
            color: #666;
        }
        .anniu a.disabled {
            color: #ccc;
            pointer-events: none;
            cursor: default;
        }
        .warning {
            max-width: 720px;
            margin: 80px auto;
            padding: 30px 35px;
            background: #fef9f0;
            border: 1px solid #ffe1b3;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: left;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .warning h2 {
            font-size: 1.9rem;
            color: #c95f0f;
            margin-top: 0;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .warning h2::before {
            content: "⚠️";
            font-size: 2rem;
        }
        .warning p {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #3d2e1c;
            margin: 0.8rem 0;
        }
        .target-link-box {
            background: #ffffffd6;
            border: 1px dashed #f1b568;
            border-radius: 18px;
            padding: 15px 20px;
            margin: 20px 0 10px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            word-break: break-all;
            word-wrap: break-word;
            color: #a0460e;
            font-size: 1rem;
            box-shadow: inset 0 1px 4px #0000000a;
        }
        .anniu {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .anniu a {
            display: inline-block;
            padding: 10px 32px;
            border-radius: 40px;
            background: #eef9f2;
            border: 1px solid #b3eac7;
            font-size: 1.2rem;
            font-weight: 550;
            transition: all 0.2s ease;
            min-width: 110px;
            text-align: center;
        }
        .anniu a.cancel-link {
            background: #f3f3f5;
            border-color: #d0d0d5;
            color: #4f4f5a;
        }
        .anniu a.cancel-link:hover {
            background: #e8e8ed;
            border-color: #b5b5c0;
            color: #2d2d36;
        }
        .anniu a:active {
            transform: scale(0.97);
        }
        .url-note {
            font-size: 0.9rem;
            color: #a76121;
            border-left: 4px solid #ffbe76;
            padding-left: 15px;
            background: #fff6e8;
            border-radius: 0 12px 12px 0;
            margin-top: 20px;
            line-height: 1.4;
        }
        @media (max-width: 600px) {
            .warning { margin: 30px 16px; padding: 20px; }
            .anniu { flex-direction: column; gap: 12px; }
            .anniu a { width: 100%; }
        }
    </style>
</head>
<body>
    <!-- 安全警告卡片（仅当非站外链接时显示；若为站内链接，头部脚本已直接跳转） -->
    <section class="warning">
        <h2>安全警告</h2>
        <p>您即将离开本站，前往外部链接。该网站并非由156博客运营，请确认链接安全后再继续。</p>
        <p>您请求的网站链接：</p>
        <div id="js-target-display" class="target-link-box">正在解析链接…</div>

        <div class="anniu" id="js-button-panel">
            <a href="#" id="cancelBtn" class="cancel-link">↩ 取消</a>
            <a href="#" id="jumpBtn">访问网站 →</a>
        </div>

        <div id="js-extra-note" class="url-note">
            ⓘ 请仔细核对域名，避免进入仿冒网站。
        </div>
    </section>

    <footer>
        <p>Copyright © 2025-2037 Creeper苦力怕i的个人博客. 保留所有权利。</p>
    </footer>

    <script>
        (function() {
            'use strict';

            // 获取DOM元素
            const targetDisplay = document.getElementById('js-target-display');
            const jumpBtn = document.getElementById('jumpBtn');
            const cancelBtn = document.getElementById('cancelBtn');
            const extraNote = document.getElementById('js-extra-note');

            // 辅助函数：安全解析URL参数 (与头部保持一致)
            function getTargetUrlFromQuery() {
                const params = new URLSearchParams(window.location.search);
                let url = params.get('url') || params.get('target') || params.get('link') || params.get('to');
                if (!url) return null;
                url = url.trim();
                try {
                    const base = window.location.origin;
                    const parsed = new URL(url, base);
                    if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') {
                        return null;
                    }
                    return parsed.href;
                } catch (e) {
                    return null;
                }
            }

            // 获取目标链接（头部脚本可能已经跳转走了，但如果未跳转说明是站外链接或无效链接）
            const targetHref = getTargetUrlFromQuery();

            // 更新显示区域
            if (targetHref) {
                let displayText = targetHref;
                if (displayText.length > 70) {
                    displayText = displayText.slice(0, 60) + '…' + displayText.slice(-25);
                }
                targetDisplay.textContent = displayText;
                targetDisplay.title = targetHref;

                jumpBtn.href = targetHref;
                jumpBtn.target = '_self';

                try {
                    const urlObj = new URL(targetHref);
                    extraNote.innerHTML = `ⓘ 目标域名：<strong>${urlObj.hostname}</strong> —— 请确认是否为可信站点。`;
                } catch {
                    extraNote.innerHTML = `ⓘ 目标链接格式已通过安全校验，但仍请仔细确认。`;
                }
            } else {
                targetDisplay.textContent = '❌ 未提供有效链接或链接参数缺失。';
                targetDisplay.style.background = '#ffe1de';
                targetDisplay.style.borderColor = '#f5a79c';
                jumpBtn.classList.add('disabled');
                jumpBtn.href = 'javascript:void(0)';
                jumpBtn.textContent = '链接不可用';
                extraNote.innerHTML = '⚠️ 链接无效或参数错误，建议返回首页。';
            }

            // 取消按钮：返回上一页或首页
            cancelBtn.addEventListener('click', function(e) {
                e.preventDefault();
                if (document.referrer && document.referrer !== '') {
                    history.back();
                } else {
                    window.location.href = 'index.html';
                }
            });

            // 如果有来源站，额外显示
            if (document.referrer) {
                try {
                    const refUrl = new URL(document.referrer);
                    extraNote.innerHTML += `<br>🔙 来自：${refUrl.hostname}`;
                } catch (e) {}
            }
        })();
    </script>
</body>
</html>
