<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/common.js"></script>
    <style>
        .anniu a {
            color: #11cb5f;
            text-decoration: none;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        .anniu a:hover {
            color: #11cb5f;
            opacity: 0.8;
        }
        .anniu .cancel-link {
            color: #888;
            margin-right: 20px;
        }
        .anniu .cancel-link:hover {
            color: #666;
        }
        .anniu a.disabled {
            color: #ccc;
            pointer-events: none;
            cursor: default;
        }
        .warning {
            max-width: 720px;
            margin: 80px auto;
            padding: 30px 35px;
            background: #fef9f0;
            border: 1px solid #ffe1b3;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: left;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .warning h2 {
            font-size: 1.9rem;
            color: #c95f0f;
            margin-top: 0;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .warning h2::before {
            content: "⚠️";
            font-size: 2rem;
        }
        .warning p {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #3d2e1c;
            margin: 0.8rem 0;
        }
        .target-link-box {
            background: #ffffffd6;
            border: 1px dashed #f1b568;
            border-radius: 18px;
            padding: 15px 20px;
            margin: 20px 0 10px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            word-break: break-all;
            word-wrap: break-word;
            color: #a0460e;
            font-size: 1rem;
            box-shadow: inset 0 1px 4px #0000000a;
        }
        .anniu {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .anniu a {
            display: inline-block;
            padding: 10px 32px;
            border-radius: 40px;
            background: #eef9f2;
            border: 1px solid #b3eac7;
            font-size: 1.2rem;
            font-weight: 550;
            transition: all 0.2s ease;
            min-width: 110px;
            text-align: center;
        }
        .anniu a.cancel-link {
            background: #f3f3f5;
            border-color: #d0d0d5;
            color: #4f4f5a;
        }
        .anniu a.cancel-link:hover {
            background: #e8e8ed;
            border-color: #b5b5c0;
            color: #2d2d36;
        }
        .anniu a:active {
            transform: scale(0.97);
        }
        .url-note {
            font-size: 0.9rem;
            color: #a76121;
            border-left: 4px solid #ffbe76;
            padding-left: 15px;
            background: #fff6e8;
            border-radius: 0 12px 12px 0;
            margin-top: 20px;
            line-height: 1.4;
        }
        @media (max-width: 600px) {
            .warning { margin: 30px 16px; padding: 20px; }
            .anniu { flex-direction: column; gap: 12px; }
            .anniu a { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <button class="menu">&#9776;</button>
        <h1><a href="/index.html">156博客</a></h1>
        <nav>
            <ul>
                <li><a href="/index.html">首页</a></li>
                <li><a href="/jump_warning.html?url=http://156pan.owo.vin">网盘</a></li>
                <li><a href="/blog.html">博客</a></li>
                <li><a href="/link.html">链接</a></li>                
            </ul>
        </nav>  
    </header>
    <section class="warning">
        <h2>404资源缺失</h2>
        <p>您访问的链接似乎已经失效，请检查您填写的链接是否正确！</p>
        <div class="anniu" id="js-button-panel">
            <a href="/index.html" id="cancelBtn" class="cancel-link">↩ 前往首页</a>
        </div>
    </section>
</body>
</html>
