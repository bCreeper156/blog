<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>软件推荐 - 156博客</title>
    <script src="js/dark_fix.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/software.css">
    <script src="/js/common.js"></script>
    <script src="/js/software_list.js"></script>
    <script src="js/nope.js"></script>
    <script>
        window.addEventListener('load', function () {
            if (!document.getElementById('back-to-top')) {
                const btn = document.createElement('button');
                btn.id = 'back-to-top';
                btn.type = 'button';
                btn.setAttribute('aria-label', '点击置顶');
                btn.title = '点击置顶';
                btn.innerHTML = '<span id="back-to-top__icon">↑</span><span id="back-to-top__label">点击置顶</span>';
                btn.addEventListener('click', function (e) {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
                document.body.appendChild(btn);
            }
        });
    </script>
</head>
<body>
    <header>
        <button class="menu">&#9776;</button>
        <h1><a href="/index.html">156博客</a></h1>
        <nav>
            <ul>
                <li><a href="/index.html">首页</a></li>
                <li><a href="/blog.html">博客</a></li>
                <li><a href="/link.html">链接</a></li>
                <li><a href="/about.html">关于</a></li>
            </ul>
        </nav>  
    </header>
    
    <main class="container software-page">
        <div class="software-panel">
            <div class="software-header">
                <div>
                    <h2>视频中的软件/156软件推荐</h2>
                </div>
                <div class="view-switch" role="group" aria-label="视图切换">
                    <button class="view-btn active" type="button" data-view="grid">缩略图模式</button>
                    <button class="view-btn" type="button" data-view="list">详细信息模式</button>
                </div>
            </div>

            <div class="controls">
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input id="software-search" type="search" placeholder="搜索软件名称、功能或关键词" aria-label="搜索软件">
                </div>
            </div>

            <div class="software-list-wrapper">
                <ul id="software-list" class="software-list"></ul>
                <div id="software-empty" class="empty-state" hidden>
                    <h3>未找到匹配的软件</h3>
                    <p>请换一个关键词，或切换到另一种显示模式试试。</p>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <p><a href ="/jump_warning.html?url=https://github.com/bCreeper156/blog/blob/main/LICENSE">Copyright © 2026 Creeper156</a></p>
    </footer>
</body>
</html>
