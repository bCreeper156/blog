    <!-- 刘德华解冻进度条脚本（原有） -->
    <script>
        // 原有刘德华进度条脚本（保持不变）
        const config = {
            targetSpringFestival: new Date('2026-02-17')
        };

        const progressBarFill = document.getElementById('progress-bar-fill');
        const progressPercentage = document.getElementById('progress-percentage');
        const springFestivalCountdown = document.getElementById('spring-festival-countdown');
        const currentDateEl = document.getElementById('current-date');
        const thawStatus = document.getElementById('thaw-status');
        const specialEventContainer = document.getElementById('special-event');
        const progressContainer = document.getElementById('andy-lau-thaw-progress');

        function isThawSeason() {
            const now = new Date();
            const month = now.getMonth() + 1;
            return month === 12 || month === 1 || month === 2;
        }

        function getLastYearSpringFestival() {
            const currentYear = new Date().getFullYear();
            return new Date(`${currentYear-1}-02-01`);
        }

        function calculateThawProgress() {
            const now = new Date();
            const startDate = getLastYearSpringFestival();
            const endDate = config.targetSpringFestival;
            const holidayDays = 7;
            const holidayEndDate = new Date(endDate);
            holidayEndDate.setDate(holidayEndDate.getDate() + holidayDays);
            
            if (now < endDate) {
                if (now < startDate) return 0;
                const totalDuration = endDate - startDate;
                const elapsedDuration = now - startDate;
                const progress = Math.min(100, Math.max(0, (elapsedDuration / totalDuration) * 100));
                return Math.round(progress * 10) / 10;
            } else if (now <= holidayEndDate) {
                return 100;
            } else {
                return 0;
            }
        }

        function calculateCountdown() {
            const now = new Date();
            const targetDate = config.targetSpringFestival;
            const holidayDays = 7;
            const holidayEndDate = new Date(targetDate);
            holidayEndDate.setDate(holidayEndDate.getDate() + holidayDays);
            
            if (now < targetDate) {
                const timeDiff = targetDate - now;
                return Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
            } else if (now <= holidayEndDate) {
                return "假期中";
            } else {
                const nextSpringFestival = new Date(targetDate);
                nextSpringFestival.setFullYear(nextSpringFestival.getFullYear() + 1);
                const timeDiff = nextSpringFestival - now;
                return Math.ceil(timeDiff / (1000 * 60 * 60 * 24));
            }
        }

        function getThawStatusDescription(progress) {
            const now = new Date();
            const endDate = config.targetSpringFestival;
            const holidayDays = 7;
            const holidayEndDate = new Date(endDate);
            holidayEndDate.setDate(holidayEndDate.getDate() + holidayDays);
            
            if (now >= endDate && now <= holidayEndDate) {
                return "🎊 春节假期中！《恭喜发财》正在各大商场热播，华仔全功率输出！";
            }
            
            if (progress === 0) return "🔄 华仔尚在冰封中，全年休假模式开启。";
            if (progress < 20) return "❄️ 解冻初期，华仔偶尔在记忆中浮现。";
            if (progress < 40) return "🧊 解冻进行中，超市尚未接到《恭喜发财》播放通知。";
            if (progress < 60) return "🌬️ 解冻近半，有网友开始感叹时间飞快。";
            if (progress < 80) return "💧 解冻加速，部分地区可能开始出现年味预热。";
            if (progress < 95) return "🔥 解冻冲刺！华仔即将去超市上班，商场开始筹备春节歌单。";
            if (progress < 100) return "🚨 高度解冻！《恭喜发财》已陆续登陆各大卖场，年味十足。";
            if (progress >= 100) return "🎉 完全解冻！华仔正式上岗，《恭喜发财》响彻大街小巷，春节到！";
            return "监测解冻状态中...";
        }

        function checkSpecialEvents() {
            const todayStr = new Date().toISOString().split('T')[0];
            const event = config.specialEvents?.find(e => e.date === todayStr);
            if (event && specialEventContainer) {
                specialEventContainer.innerHTML = `
                    <h4>${event.title}</h4>
                    <p>${event.description}</p>
                `;
                specialEventContainer.style.display = 'block';
            } else if (specialEventContainer) {
                specialEventContainer.style.display = 'none';
            }
        }

        function toggleProgressVisibility() {
            const isSeason = isThawSeason();
            if (isSeason) {
                progressContainer.classList.add('show');
                return true;
            } else {
                progressContainer.classList.remove('show');
                return false;
            }
        }

        function updateAllDisplays() {
            const isSeason = toggleProgressVisibility();
            if (!isSeason) return;
            
            const progress = calculateThawProgress();
            const countdown = calculateCountdown();
            const now = new Date();
            
            progressBarFill.style.width = `${progress}%`;
            progressBarFill.textContent = `${progress}%`;
            progressPercentage.textContent = progress;
            springFestivalCountdown.textContent = countdown;
            currentDateEl.textContent = now.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            thawStatus.textContent = getThawStatusDescription(progress);
            checkSpecialEvents();
            
            if (progress >= 100) {
                progressBarFill.style.background = 'linear-gradient(90deg, #f97316 0%, #eab308 50%, #84cc16 100%)';
                thawStatus.style.backgroundColor = '#dcfce7';
                thawStatus.style.borderLeftColor = '#16a34a';
                thawStatus.style.color = '#166534';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateAllDisplays();
            setInterval(updateAllDisplays, 3600000);
            
            const now = new Date();
            const millisecondsUntilMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1, 0, 0, 0) - now;
            setTimeout(function() {
                updateAllDisplays();
                setInterval(updateAllDisplays, 86400000);
            }, millisecondsUntilMidnight);
        });
    </script>
    <script>
        (function() {
            const loaderWrap = document.getElementById('githubLoaderWrap');
            const loaderBar = document.getElementById('githubLoader');
            const loaderTip = document.getElementById('githubLoaderTip');

            function setLoaderProgress(percent, text) {
                const value = Math.min(100, Math.max(0, percent));
                loaderBar.style.width = value + '%';
                loaderTip.textContent = text || `加载中 ${value}%`;
                if (value >= 100) {
                    loaderWrap.classList.add('hide');
                    loaderTip.classList.remove('show');
                } else {
                    loaderTip.classList.add('show');
                }
            }

            function getEstimatedProgress() {
                const resources = performance.getEntriesByType('resource') || [];
                if (resources.length === 0) return 0;
                const loaded = resources.filter(res => res.responseEnd > 0).length;
                return Math.round((loaded / resources.length) * 80);
            }

            function runLoader() {
                const readyState = document.readyState;
                if (readyState === 'loading') {
                    setLoaderProgress(10, '开始加载页面...');
                } else if (readyState === 'interactive') {
                    const p = Math.max(35, getEstimatedProgress());
                    setLoaderProgress(p, `DOM已就绪 ${p}%`);
                } else if (readyState === 'complete') {
                    setLoaderProgress(95, '正在完成加载...');
                }
            }

            const poller = window.setInterval(function() {
                runLoader();
                if (document.readyState === 'complete') {
                    clearInterval(poller);
                }
            }, 80);

            window.addEventListener('load', function() {
                setLoaderProgress(100, '加载完成，欢迎回来！');
                window.setTimeout(() => {
                    loaderWrap.classList.add('hide');
                    loaderTip.classList.remove('show');
                }, 350);
            });
        })();
    </script>
