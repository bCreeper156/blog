<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>156博客 - 系统/浏览器升级提醒</title>
    <style>
        /* 采用 display:table 布局，保证 IE8 及 XP 系统完美居中 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #f8fafc;
            color: #334155;
            font-family: "Microsoft YaHei", Arial, sans-serif;
            display: table;
            width: 100%;
            height: 100vh;
            height: 100%; /* 兼容 IE8 及以下 */
        }
        
        .error-wrapper {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
            padding: 20px;
        }
        
        .error-wrapper h1 {
            font-size: 26px;
            color: #10B981; /* 你的苦力怕绿 */
            margin-bottom: 15px;
        }
        .error-wrapper p {
            font-size: 15px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 12px;
        }
        .error-wrapper .highlight {
            color: #1e293b;
            font-weight: bold;
        }
        
        .btn-group {
            margin-top: 25px;
        }
        
        /* 基础按钮，无圆角、无阴影 */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            background-color: #10B981;
            border: none;
            text-decoration: none;
            cursor: pointer;
        }
        .btn:hover {
            background-color: #0b7a44;
        }
        
        .btn.secondary {
            background-color: #3b82f6;
        }
        .btn.secondary:hover {
            background-color: #2563eb;
        }
        
        .footer-note {
            margin-top: 30px;
            font-size: 13px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <h1>[!] 时代变了，老伙计</h1>
        <p>
            你正在使用的操作系统或浏览器版本过于老旧，<br>
            由于 <span class="highlight">156博客 V2.0.0</span> 使用了现代极客架构，<br>
            <span class="highlight">无法与您当前的环境建立安全连接</span>。
        </p>
        <p style="font-size: 14px; color: #94a3b8; margin-top: 10px;">
            为了您的网络安全及深色极客体验，<br>
            请在较新的系统上，使用下方现代浏览器访问。
        </p>
        
        <div class="btn-group">
            <!-- Google Chrome 放在第一位，用蓝色打头 -->
            <a href="https://www.google.cn/chrome/" target="_blank" class="btn secondary">
                [下载] Google Chrome
            </a>
            <!-- Microsoft Edge 排在第二位，用苦力怕绿 -->
            <a href="https://www.microsoft.com/zh-cn/edge" target="_blank" class="btn">
                [下载] Microsoft Edge
            </a>
        </div>

        <div class="footer-note">
            （不是我不给你机会，是 XP + 旧浏览器真的带不动现代网络协议了）
        </div>
    </div>

</body>
</html>
